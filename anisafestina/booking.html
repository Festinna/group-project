<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cinema Booking</title>
<link rel="stylesheet" href="booking.css">
</head>

<body>

<h1>🎬 Cinema Booking</h1>

<div class="box">

    <h3>⏰ Time</h3>
    <select id="time">
        <option>18:00</option>
        <option>20:30</option>
        <option>22:45</option>
    </select>

    <h3>💺 Seat</h3>
    <input type="text" id="seat" placeholder="e.g. A10">

    <h3>🎟 Tickets</h3>
    <input type="number" id="tickets" placeholder="How many">

    <button onclick="book()">Book Ticket</button>

    <p id="result"></p>

</div>

<script src="booking.js"></script>
</body>
</html>
