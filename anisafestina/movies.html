<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinema Booking System</title>
    <link rel="stylesheet" href="movies.css">
</head>
<body>

    
    <nav class="navbar">
        <div class="logo">🎬 Cinema Booking</div>

        <ul class="nav-links">
            <li><a href="about.html">About Us</a></li>
            <li><a href="movies.html">Movies</a></li>
            <li><a href="booking.html">Booking</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

    
    <h1>Cinema Booking System</h1>

    
    <section id="about" class="section">
        <h2>About Us</h2>
        <p>
            Welcome to our Cinema Booking System. Browse movies by category,
            select your favorite movie, and book tickets quickly and easily.
        </p>
    </section>

    <div class="container">

        
        <div class="sidebar">
            <h2>Category</h2>

            <button onclick="showCategory('Action Movies')">
                Action Movies
            </button>

            <button onclick="showCategory('Adventure Movies')">
                Adventure Movies
            </button>

            <button onclick="showCategory('Comedy Movies')">
                Comedy Movies
            </button>

            <button onclick="showCategory('Horror Movies')">
                Horror Movies
            </button>

            <button onclick="showCategory('Drama Movies')">
                Drama Movies
            </button>

            <button onclick="showCategory('Crime/Thriller Movies')">
                Crime/Thriller Movies
            </button>

            <button onclick="showCategory('Must Watch Movies')">
                Must Watch Movies
            </button>
        </div>

        
        <div class="main" id="moviesSection">

            <h2 id="categoryTitle">Select a category</h2>

            <div id="movies" class="movies"></div>

           
            <div id="bookingBox" class="booking hidden">
                <h3>🎟 Ticket Booking</h3>

                <p id="selectedMovie">Selected movie:</p>

                <input type="text" id="name" placeholder="Your name">

                <input type="number" id="seats"
                       placeholder="Number of tickets">

                <button onclick="bookTicket()">
                    Confirm Booking
                </button>

                <p id="result"></p>
            </div>

        </div>
    </div>

   
    <script src="movies.js"></script>

</body>
</html>
